<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080808;--s1:#0f0f0f;--s2:#151515;
  --b1:#1e1e1e;--b2:#272727;--b3:#313131;
  --text:#ececec;--dim:#666;--sub:#333;
  --blue:#5b8df0;--blue2:#7aa6f5;
  --green:#3ecf8e;--red:#e05c5c;--gold:#f0b429;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px;}

.page{max-width:680px;margin:0 auto;padding:52px 20px 120px;}

nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:80px;}
.logo{font-size:0.72rem;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--text);}
.logo i{color:var(--blue);font-style:normal;}
.pill{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);border:1px solid var(--b2);padding:4px 10px;border-radius:99px;}

.hero{margin-bottom:36px;}
.hero h1{font-size:clamp(2.2rem,7vw,3.2rem);font-weight:300;letter-spacing:-2px;line-height:1.05;}
.hero h1 strong{font-weight:600;}

.search-outer{position:relative;margin-bottom:64px;}
.search-box{display:flex;background:var(--s1);border:1px solid var(--b2);border-radius:14px;overflow:hidden;transition:border-color .25s,box-shadow .25s;}
.search-box:focus-within{border-color:var(--b3);box-shadow:0 0 0 3px rgba(91,141,240,.07);}
.search-box input{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.93rem;padding:15px 16px;outline:none;min-width:0;}
.search-box input::placeholder{color:var(--sub);}
.clear-btn{background:transparent;border:none;color:var(--dim);padding:0 12px;cursor:pointer;font-size:.9rem;display:none;align-items:center;justify-content:center;transition:color .15s;line-height:1;}
.clear-btn:hover{color:var(--text);}
.clear-btn.show{display:flex;}
.search-btn{background:var(--blue);border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;padding:15px 22px;cursor:pointer;transition:background .15s;white-space:nowrap;}
.search-btn:hover{background:#4a7be0;}
.search-btn:disabled{opacity:.3;cursor:not-allowed;}
.err-msg{display:none;font-size:.73rem;color:var(--red);margin-top:9px;font-family:'DM Mono',monospace;padding-left:2px;}

.loader{display:none;padding:60px 0;text-align:center;}
.ltrack{width:80px;height:1px;background:var(--b1);margin:0 auto;position:relative;overflow:hidden;}
.ltrack::after{content:'';position:absolute;left:-70%;width:70%;height:100%;background:linear-gradient(90deg,transparent,var(--blue),transparent);animation:lrun 1.1s ease infinite;}
@keyframes lrun{to{left:130%;}}

#result{display:none;}
.sec{opacity:0;transform:translateY(14px);transition:opacity .4s ease,transform .4s ease;margin-bottom:40px;}
.sec.in{opacity:1;transform:translateY(0);}

/* PROFILE */
.profile-top{display:flex;gap:22px;align-items:flex-end;}
.av-col{flex-shrink:0;position:relative;}
.av-main{width:116px;height:116px;border-radius:16px;background:var(--s2);border:1px solid var(--b2);object-fit:cover;display:block;transition:transform .3s ease;}
.av-main:hover{transform:scale(1.03);}
.sdot{position:absolute;bottom:-3px;right:-3px;width:13px;height:13px;border-radius:50%;border:2.5px solid var(--bg);}
.sd-on{background:var(--green);}
.sd-game{background:var(--blue);}
.sd-off{background:var(--sub);}
.pinfo{flex:1;min-width:0;padding-bottom:2px;}
.pname{font-size:1.3rem;font-weight:600;letter-spacing:-.5px;margin-bottom:3px;word-break:break-word;}
.pmeta{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px;}
.pmeta span{background:var(--s2);border:1px solid var(--b1);padding:2px 7px;border-radius:4px;}
.pdesc{font-size:.82rem;color:var(--dim);line-height:1.7;margin-bottom:12px;word-break:break-word;font-style:italic;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-size:.62rem;font-weight:500;padding:3px 9px;border-radius:6px;}
.c-on{background:rgba(62,207,142,.1);color:var(--green);}
.c-game{background:rgba(91,141,240,.12);color:var(--blue2);}
.c-off{background:rgba(60,60,60,.2);color:var(--dim);}
.c-ver{background:rgba(240,180,41,.1);color:var(--gold);}
.c-ban{background:rgba(224,92,92,.1);color:var(--red);}

.div{height:1px;background:var(--b1);margin:28px 0;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--b1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:40px;}
.stat{background:var(--s1);padding:16px 8px;text-align:center;transition:background .15s;}
.stat:hover{background:var(--s2);}
.sv{font-size:.95rem;font-weight:600;letter-spacing:-.3px;margin-bottom:4px;}
.sl{font-size:.52rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}

.slabel{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--dim);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.slabel::after{content:'';flex:1;height:1px;background:var(--b1);}

/* DETAILS */
.trow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--b1);gap:12px;flex-wrap:wrap;}
.trow:last-child{border:none;}
.tk{font-size:.8rem;color:var(--dim);}
.tv{font-family:'DM Mono',monospace;font-size:.74rem;color:var(--text);text-align:right;word-break:break-all;}

/* FOLLOWERS / FOLLOWING */
.follow-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fol-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px;text-align:center;transition:border-color .2s,transform .2s;}
.fol-card:hover{border-color:var(--b2);transform:translateY(-2px);}
.fol-num{font-size:1.8rem;font-weight:700;letter-spacing:-1px;margin-bottom:4px;}
.fol-lbl{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;}

/* FRIENDS */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px;}
.fcard{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px 8px 12px;text-align:center;cursor:pointer;transition:background .2s,border-color .2s,transform .2s;position:relative;overflow:hidden;}
.fcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--blue2));transform:scaleX(0);transition:transform .25s ease;transform-origin:left;}
.fcard:hover{background:var(--s2);border-color:var(--b2);transform:translateY(-2px);}
.fcard:hover::after{transform:scaleX(1);}
.fav{width:56px;height:56px;border-radius:10px;background:var(--s2);border:1px solid var(--b2);margin:0 auto 8px;display:block;object-fit:cover;transition:transform .2s;}
.fcard:hover .fav{transform:scale(1.05);}
.fname{font-size:.72rem;font-weight:500;color:var(--text);word-break:break-word;line-height:1.3;margin-bottom:3px;}
.fuser{font-size:.6rem;color:var(--blue2);font-family:'DM Mono',monospace;word-break:break-word;}
.fid{font-size:.53rem;color:var(--sub);font-family:'DM Mono',monospace;margin-top:2px;}

/* GROUPS */
.glist-wrap{display:flex;flex-direction:column;gap:0;}
.gitem{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--b1);transition:opacity .15s;}
.gitem:last-child{border:none;}
.gitem:hover{opacity:.75;}
.gico{width:40px;height:40px;border-radius:9px;background:var(--s2);border:1px solid var(--b2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--dim);font-family:'DM Mono',monospace;}
.gico img{width:100%;height:100%;object-fit:cover;display:block;}
.gname{font-size:.87rem;font-weight:500;margin-bottom:2px;}
.grole{font-size:.65rem;color:var(--blue2);font-family:'DM Mono',monospace;}
.gmem{font-size:.6rem;color:var(--dim);margin-top:1px;}

/* BADGES */
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.rbadge{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px 12px;transition:border-color .15s;}
.rbadge:hover{border-color:var(--b2);}
.rbadge-icon{width:30px;height:30px;border-radius:6px;background:var(--s2);object-fit:cover;flex-shrink:0;}
.rbadge-name{font-size:.74rem;font-weight:500;margin-bottom:2px;}
.rbadge-date{font-size:.58rem;color:var(--dim);font-family:'DM Mono',monospace;}

/* EXPERIENCES */
.expgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.expcard{background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .2s;}
.expcard:hover{border-color:var(--b2);transform:translateY(-2px);}
.expthumb{width:100%;height:88px;object-fit:cover;background:var(--s2);display:block;}
.expinfo{padding:10px 12px 12px;}
.expname{font-size:.77rem;font-weight:500;margin-bottom:3px;line-height:1.3;}
.expplays{font-size:.6rem;color:var(--dim);font-family:'DM Mono',monospace;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:18px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;padding:26px;animation:mopen .25s ease;position:relative;}
@keyframes mopen{from{opacity:0;transform:scale(.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-close{position:absolute;top:16px;right:16px;background:var(--s2);border:1px solid var(--b2);color:var(--dim);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;transition:color .15s;}
.modal-close:hover{color:var(--text);}
.m-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;}
.m-av{width:72px;height:72px;border-radius:12px;background:var(--s2);border:1px solid var(--b2);object-fit:cover;flex-shrink:0;}
.m-name{font-size:1.1rem;font-weight:600;letter-spacing:-.3px;margin-bottom:4px;}
.m-meta{font-family:'DM Mono',monospace;font-size:.63rem;color:var(--dim);display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.m-meta span{background:var(--s2);border:1px solid var(--b1);padding:2px 6px;border-radius:4px;}
.m-chips{display:flex;flex-wrap:wrap;gap:5px;}
.m-desc{font-size:.8rem;color:var(--dim);line-height:1.7;margin-bottom:14px;font-style:italic;}
.m-div{height:1px;background:var(--b1);margin:14px 0;}
.m-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--b1);border:1px solid var(--b1);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.mst{background:var(--s2);padding:12px 8px;text-align:center;}
.mst-v{font-size:.9rem;font-weight:600;letter-spacing:-.4px;margin-bottom:3px;}
.mst-l{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;}

footer{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--sub);letter-spacing:1px;margin-top:20px;}

@media(max-width:520px){
  .stats{grid-template-columns:repeat(3,1fr);}
  .profile-top{flex-direction:column;align-items:center;text-align:center;}
  .chips,.pmeta{justify-content:center;}
  .tv{text-align:left;}
}
@media(max-width:360px){
  .stats{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="page">

  <nav>
    <div class="logo">Vexr<i>a</i></div>
    <div class="pill">Profile Lookup</div>
  </nav>

  <div class="hero">
    <h1>Find any<br><strong>Roblox profile.</strong></h1>
  </div>

  <div class="search-outer">
    <div class="search-box">
      <input type="text" id="inp" placeholder="Enter username" autocomplete="off" spellcheck="false"/>
      <button class="clear-btn" id="clearBtn" onclick="clearInput()">✕</button>
      <button class="search-btn" id="searchBtn" onclick="lookup()">Search</button>
    </div>
    <div class="err-msg" id="err"></div>
  </div>

  <div class="loader" id="load"><div class="ltrack"></div></div>

  <div id="result">

    <div class="sec" id="s-profile">
      <div class="profile-top">
        <div class="av-col">
          <img class="av-main" id="av" src="" alt=""/>
          <div class="sdot" id="sdot"></div>
        </div>
        <div class="pinfo">
          <div class="pname" id="pname"></div>
          <div class="pmeta" id="pmeta"></div>
          <div class="pdesc" id="pdesc"></div>
          <div class="chips" id="chips"></div>
        </div>
      </div>
    </div>

    <div class="div"></div>

    <div class="sec" id="s-stats">
      <div class="stats" id="stats"></div>
    </div>

    <div class="sec" id="s-details">
      <div class="slabel">Details</div>
      <div id="details"></div>
    </div>

    <div class="sec" id="s-follow">
      <div class="slabel">Social</div>
      <div class="follow-grid" id="followgrid"></div>
    </div>

    <div class="sec" id="s-friends" style="display:none">
      <div class="slabel">Friends <span style="font-size:.48rem;letter-spacing:.5px;color:var(--sub);">TAP TO VIEW</span></div>
      <div class="fgrid" id="fgrid"></div>
    </div>

    <div class="sec" id="s-groups" style="display:none">
      <div class="slabel">Groups</div>
      <div class="glist-wrap" id="glist"></div>
    </div>

    <div class="sec" id="s-badges" style="display:none">
      <div class="slabel">Badges Earned</div>
      <div class="badges-grid" id="badges"></div>
    </div>

    <div class="sec" id="s-exp" style="display:none">
      <div class="slabel">Experiences</div>
      <div class="expgrid" id="expgrid"></div>
    </div>

  </div>

  <footer>Vexra</footer>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="bgClose(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="m-top">
      <img class="m-av" id="m-av" src="" alt=""/>
      <div>
        <div class="m-name" id="m-name"></div>
        <div class="m-meta" id="m-meta"></div>
        <div class="m-chips" id="m-chips"></div>
      </div>
    </div>
    <div class="m-desc" id="m-desc"></div>
    <div class="m-stats" id="m-stats"></div>
    <div class="m-div"></div>
    <div id="m-details"></div>
  </div>
</div>

<script>
const PROXY="https://corsproxy.io/?";
const get=u=>fetch(PROXY+encodeURIComponent(u)).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});
const post=(u,b)=>fetch(PROXY+encodeURIComponent(u),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());
const fmt=n=>{if(n==null)return'—';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString();};
const fdate=d=>d?new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}):'—';
const age=d=>{if(!d)return'—';const days=Math.floor((Date.now()-new Date(d))/864e5);const y=Math.floor(days/365),m=Math.floor((days%365)/30);return y>0?`${y}y ${m}m`:`${m}m`;};
const row=(k,v)=>`<div class="trow"><span class="tk">${k}</span><span class="tv">${v??'—'}</span></div>`;
const PTL=['Offline','Online','In Game','In Studio'];
const PTC=['c-off','c-on','c-game','c-game'];

const inp=document.getElementById('inp');
const clearBtn=document.getElementById('clearBtn');
inp.addEventListener('input',()=>clearBtn.classList.toggle('show',inp.value.length>0));
inp.addEventListener('keydown',e=>e.key==='Enter'&&lookup());

function clearInput(){inp.value='';inp.focus();clearBtn.classList.remove('show');document.getElementById('err').style.display='none';}

function animateSections(){
  document.querySelectorAll('.sec').forEach((s,i)=>setTimeout(()=>s.classList.add('in'),i*75));
}

async function lookup(){
  const u=inp.value.trim();
  if(!u)return;
  document.getElementById('err').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('load').style.display='block';
  document.getElementById('searchBtn').disabled=true;
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('in'));

  try{
    const ud=await post('https://users.roblox.com/v1/usernames/users',{usernames:[u],excludeBannedUsers:false});
    if(!ud.data?.length)throw new Error(`"${u}" not found`);
    const id=ud.data[0].id;

    const[info,pres,friends,groups,thumb,badgesR,expsR,folR,folngR]=await Promise.allSettled([
      get(`https://users.roblox.com/v1/users/${id}`),
      post('https://presence.roblox.com/v1/presence/users',{userIds:[id]}),
      get(`https://friends.roblox.com/v1/users/${id}/friends?limit=50`),
      get(`https://groups.roblox.com/v1/users/${id}/groups/roles`),
      get(`https://thumbnails.roblox.com/v1/users/avatar?userIds=${id}&size=420x420&format=Png`),
      get(`https://badges.roblox.com/v1/users/${id}/badges?limit=20&sortOrder=Desc`),
      get(`https://games.roblox.com/v2/users/${id}/games?limit=50&sortOrder=Asc`),
      get(`https://friends.roblox.com/v1/users/${id}/followers/count`),
      get(`https://friends.roblox.com/v1/users/${id}/followings/count`)
    ]);

    const I=info.value??{};
    const PR=pres.value?.userPresences?.[0];
    const pt=PR?.userPresenceType??0;
    const F=friends.value?.data??[];
    const G=groups.value?.data??[];
    const imgUrl=thumb.value?.data?.[0]?.imageUrl??'';
    const B=badgesR.value?.data??[];
    const E=expsR.value?.data??[];
    const followers=folR.value?.count??null;
    const following=folngR.value?.count??null;

    document.getElementById('av').src=imgUrl;

    const sd=document.getElementById('sdot');
    sd.className='sdot '+(pt===2?'sd-game':pt>=1?'sd-on':'sd-off');

    document.getElementById('pname').textContent=I.displayName||I.name||u;

    const same=I.displayName===I.name;
    let metaHTML=`<span>@${I.name}</span>`;
    if(!same)metaHTML+=`<span>${I.displayName}</span>`;
    metaHTML+=`<span>${id}</span>`;
    document.getElementById('pmeta').innerHTML=metaHTML;

    document.getElementById('pdesc').textContent=I.description?.trim()||'No description.';

    let chips=`<span class="chip ${PTC[pt]??'c-off'}">${PTL[pt]??'Unknown'}</span>`;
    if(I.hasVerifiedBadge)chips+=`<span class="chip c-ver">✦ Verified</span>`;
    if(I.isBanned)chips+=`<span class="chip c-ban">Banned</span>`;
    document.getElementById('chips').innerHTML=chips;

    document.getElementById('stats').innerHTML=`
      <div class="stat"><div class="sv">${fmt(F.length)}</div><div class="sl">Friends</div></div>
      <div class="stat"><div class="sv">${fmt(followers)}</div><div class="sl">Followers</div></div>
      <div class="stat"><div class="sv">${fmt(following)}</div><div class="sl">Following</div></div>
      <div class="stat"><div class="sv">${fmt(G.length)}</div><div class="sl">Groups</div></div>
      <div class="stat"><div class="sv">${fmt(B.length)}${(badgesR.value?.totalCount??0)>20?'+':''}</div><div class="sl">Badges</div></div>
      <div class="stat"><div class="sv">${age(I.created)}</div><div class="sl">Age</div></div>
    `;

    document.getElementById('details').innerHTML=
      row('Username',I.name)+
      row('Display Name',I.displayName||I.name)+
      row('User ID',id)+
      row('Joined',fdate(I.created))+
      row('Account Age',age(I.created))+
      row('Status',PTL[pt]??'—')+
      row('Last Location',PR?.lastLocation||'—')+
      row('Verified',I.hasVerifiedBadge?'Yes':'No')+
      row('Banned',I.isBanned?'Yes':'No');

    document.getElementById('followgrid').innerHTML=`
      <div class="fol-card"><div class="fol-num">${fmt(followers)}</div><div class="fol-lbl">Followers</div></div>
      <div class="fol-card"><div class="fol-num">${fmt(following)}</div><div class="fol-lbl">Following</div></div>
    `;

    // Friends
    const fsec=document.getElementById('s-friends');
    if(F.length){
      const fids=F.slice(0,24).map(f=>f.id);
      let ft={};
      try{const r=await get(`https://thumbnails.roblox.com/v1/users/avatar?userIds=${fids.join(',')}&size=150x150&format=Png`);r.data?.forEach(t=>{ft[t.targetId]=t.imageUrl;});}catch(e){}
      document.getElementById('fgrid').innerHTML=F.slice(0,24).map(f=>`
        <div class="fcard" onclick='openFriend(${f.id},${JSON.stringify(f.displayName||f.name)},${JSON.stringify(f.name)},${JSON.stringify(ft[f.id]||"")})'>
          <img class="fav" src="${ft[f.id]||''}" alt="${f.name}" onerror="this.style.opacity=0.1"/>
          <div class="fname">${f.displayName||f.name}</div>
          <div class="fuser">@${f.name}</div>
          <div class="fid">${f.id}</div>
        </div>`).join('');
      fsec.style.display='';
    }else fsec.style.display='none';

    // Groups
    const gsec=document.getElementById('s-groups');
    if(G.length){
      const gids=G.slice(0,20).map(g=>g.group?.id).filter(Boolean);
      let gi={};
      try{const r=await get(`https://thumbnails.roblox.com/v1/groups/icons?groupIds=${gids.join(',')}&size=150x150&format=Png`);r.data?.forEach(t=>{gi[t.targetId]=t.imageUrl;});}catch(e){}
      document.getElementById('glist').innerHTML=G.slice(0,20).map(g=>`
        <div class="gitem">
          <div class="gico">${gi[g.group?.id]?`<img src="${gi[g.group.id]}" alt="" onerror="this.parentElement.innerHTML='#'"/>`:'#'}</div>
          <div>
            <div class="gname">${g.group?.name||'Group'}</div>
            <div class="grole">${g.role?.name||'Member'}</div>
            ${g.group?.memberCount?`<div class="gmem">${fmt(g.group.memberCount)} members</div>`:''}
          </div>
        </div>`).join('');
      gsec.style.display='';
    }else gsec.style.display='none';

    // Badges
    const bsec=document.getElementById('s-badges');
    if(B.length){
      const bids=B.map(b=>b.id);
      let bt={};
      try{const r=await get(`https://thumbnails.roblox.com/v1/badges/icons?badgeIds=${bids.join(',')}&size=150x150&format=Png`);r.data?.forEach(t=>{bt[t.targetId]=t.imageUrl;});}catch(e){}
      document.getElementById('badges').innerHTML=B.map(b=>`
        <div class="rbadge">
          <img class="rbadge-icon" src="${bt[b.id]||''}" alt="" onerror="this.style.opacity=0.1"/>
          <div><div class="rbadge-name">${b.name||'Badge'}</div><div class="rbadge-date">${fdate(b.awardedDate)}</div></div>
        </div>`).join('');
      bsec.style.display='';
    }else bsec.style.display='none';

    // Experiences
    const esec=document.getElementById('s-exp');
    if(E.length){
      const eids=E.slice(0,12).map(e=>e.rootPlace?.id).filter(Boolean);
      let et={};
      try{const r=await get(`https://thumbnails.roblox.com/v1/places/gameicons?placeIds=${eids.join(',')}&size=256x256&format=Png`);r.data?.forEach(t=>{et[t.targetId]=t.imageUrl;});}catch(e){}
      document.getElementById('expgrid').innerHTML=E.slice(0,12).map(e=>`
        <div class="expcard">
          <img class="expthumb" src="${et[e.rootPlace?.id]||''}" alt="" onerror="this.style.opacity=0.1"/>
          <div class="expinfo"><div class="expname">${e.name||'Experience'}</div><div class="expplays">${fmt(e.playsCount??e.visits??0)} plays</div></div>
        </div>`).join('');
      esec.style.display='';
    }else esec.style.display='none';

    document.getElementById('result').style.display='block';
    requestAnimationFrame(()=>requestAnimationFrame(animateSections));

  }catch(e){
    const el=document.getElementById('err');
    el.textContent=e.message||'Something went wrong.';
    el.style.display='block';
  }finally{
    document.getElementById('load').style.display='none';
    document.getElementById('searchBtn').disabled=false;
  }
}

async function openFriend(id,displayName,username,avatarUrl){
  document.getElementById('m-av').src=avatarUrl||'';
  document.getElementById('m-name').textContent=displayName;
  document.getElementById('m-meta').innerHTML=`<span>@${username}</span><span>${id}</span>`;
  document.getElementById('m-chips').innerHTML='';
  document.getElementById('m-desc').textContent='Loading…';
  document.getElementById('m-stats').innerHTML='';
  document.getElementById('m-details').innerHTML='';
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';

  try{
    const[info,pres,fc,gc,folR,folngR]=await Promise.allSettled([
      get(`https://users.roblox.com/v1/users/${id}`),
      post('https://presence.roblox.com/v1/presence/users',{userIds:[id]}),
      get(`https://friends.roblox.com/v1/users/${id}/friends/count`),
      get(`https://groups.roblox.com/v1/users/${id}/groups/roles`),
      get(`https://friends.roblox.com/v1/users/${id}/followers/count`),
      get(`https://friends.roblox.com/v1/users/${id}/followings/count`)
    ]);

    const I=info.value??{};
    const PR=pres.value?.userPresences?.[0];
    const pt=PR?.userPresenceType??0;

    document.getElementById('m-desc').textContent=I.description?.trim()||'No description.';

    let chips=`<span class="chip ${PTC[pt]??'c-off'}">${PTL[pt]??'Unknown'}</span>`;
    if(I.hasVerifiedBadge)chips+=`<span class="chip c-ver">✦ Verified</span>`;
    if(I.isBanned)chips+=`<span class="chip c-ban">Banned</span>`;
    document.getElementById('m-chips').innerHTML=chips;

    document.getElementById('m-stats').innerHTML=`
      <div class="mst"><div class="mst-v">${fmt(fc.value?.count)}</div><div class="mst-l">Friends</div></div>
      <div class="mst"><div class="mst-v">${fmt(folR.value?.count)}</div><div class="mst-l">Followers</div></div>
      <div class="mst"><div class="mst-v">${fmt(folngR.value?.count)}</div><div class="mst-l">Following</div></div>
    `;

    document.getElementById('m-details').innerHTML=
      row('Username',I.name)+
      row('Display Name',I.displayName||I.name)+
      row('User ID',id)+
      row('Joined',fdate(I.created))+
      row('Account Age',age(I.created))+
      row('Status',PTL[pt]??'—')+
      row('Last Location',PR?.lastLocation||'—')+
      row('Groups',fmt(gc.value?.data?.length))+
      row('Verified',I.hasVerifiedBadge?'Yes':'No');

    try{
      const t=await get(`https://thumbnails.roblox.com/v1/users/avatar?userIds=${id}&size=420x420&format=Png`);
      const url=t.data?.[0]?.imageUrl;
      if(url)document.getElementById('m-av').src=url;
    }catch(e){}

  }catch(e){
    document.getElementById('m-desc').textContent='Could not load profile.';
  }
}

function bgClose(e){if(e.target===document.getElementById('modalBg'))closeModal();}
function closeModal(){document.getElementById('modalBg').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>e.key==='Escape'&&closeModal());
</script>
</body>
