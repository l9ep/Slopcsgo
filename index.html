<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #0d0d0d;
    --card: #141414;
    --border: #1f1f1f;
    --border2: #2a2a2a;
    --text: #f0f0f0;
    --sub: #555;
    --dim: #888;
    --accent: #fff;
    --blue: #4f8ef7;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 20px 100px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 80px;
  }

  .wordmark {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text);
  }

  .dot { color: var(--blue); }

  .version {
    font-size: 0.65rem;
    color: var(--sub);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Hero */
  .hero { margin-bottom: 48px; }

  .hero h1 {
    font-size: clamp(2.2rem, 7vw, 3.2rem);
    font-weight: 300;
    letter-spacing: -1.5px;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 8px;
  }

  .hero h1 strong {
    font-weight: 600;
  }

  .hero p {
    font-size: 0.85rem;
    color: var(--sub);
    font-weight: 400;
  }

  /* Search */
  .search {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 64px;
    transition: border-color 0.2s;
  }

  .search:focus-within {
    border-color: #333;
  }

  .search input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    padding: 15px 18px;
    outline: none;
  }

  .search input::placeholder { color: var(--sub); }

  .search button {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border2);
    color: var(--dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 15px 20px;
    cursor: pointer;
    transition: color 0.2s;
    white-space: nowrap;
  }

  .search button:hover { color: var(--text); }
  .search button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Error */
  .error {
    display: none;
    font-size: 0.8rem;
    color: #e05555;
    margin-bottom: 24px;
    padding-left: 2px;
  }

  /* Loader */
  .loader {
    display: none;
    padding: 60px 0;
    text-align: center;
  }

  .loader-bar {
    width: 120px;
    height: 1px;
    background: var(--border2);
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  .loader-bar::after {
    content: '';
    position: absolute;
    left: -50%;
    top: 0;
    width: 50%;
    height: 100%;
    background: var(--blue);
    animation: slide 1s ease infinite;
  }

  @keyframes slide {
    from { left: -50%; }
    to   { left: 120%; }
  }

  /* Result */
  #result { display: none; }

  .fade { animation: fade 0.3s ease; }

  @keyframes fade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Profile */
  .profile {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 40px;
  }

  .av {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border2);
    object-fit: cover;
    flex-shrink: 0;
  }

  .pinfo { flex: 1; min-width: 0; }

  .pname {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 3px;
    word-break: break-word;
  }

  .pmeta {
    font-size: 0.75rem;
    color: var(--sub);
    margin-bottom: 10px;
  }

  .pdesc {
    font-size: 0.82rem;
    color: var(--dim);
    line-height: 1.6;
    word-break: break-word;
  }

  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .badge {
    font-size: 0.65rem;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .b-online  { background: rgba(52,211,153,0.1); color: #34d399; }
  .b-ingame  { background: rgba(79,142,247,0.1); color: var(--blue); }
  .b-offline { background: rgba(100,100,100,0.12); color: var(--sub); }
  .b-verify  { background: rgba(255,255,255,0.06); color: var(--dim); }
  .b-banned  { background: rgba(224,85,85,0.1); color: #e05555; }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 40px;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .stat {
    background: var(--card);
    padding: 18px 14px;
    text-align: center;
  }

  .stat-v {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .stat-l {
    font-size: 0.62rem;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  /* Info table */
  .table { margin-bottom: 40px; }

  .label {
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .trow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .trow:last-child { border: none; }
  .tk { font-size: 0.8rem; color: var(--dim); }
  .tv { font-size: 0.8rem; color: var(--text); font-weight: 500; text-align: right; word-break: break-all; }

  /* Friends */
  .friends-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 8px;
    margin-bottom: 40px;
  }

  .fc {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 8px;
    text-align: center;
    transition: border-color 0.15s;
  }

  .fc:hover { border-color: var(--border2); }

  .fav {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--border2);
    margin: 0 auto 7px;
    display: block;
    object-fit: cover;
  }

  .fn {
    font-size: 0.68rem;
    color: var(--dim);
    word-break: break-word;
    line-height: 1.3;
  }

  /* Groups */
  .groups { margin-bottom: 40px; }

  .gi {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .gi:last-child { border: none; }

  .gico {
    width: 32px;
    height: 32px;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .gn { font-size: 0.85rem; font-weight: 500; margin-bottom: 2px; }
  .gr { font-size: 0.7rem; color: var(--sub); }

  /* Footer */
  footer {
    font-size: 0.65rem;
    color: var(--sub);
    letter-spacing: 0.5px;
  }

  @media(max-width:480px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .profile { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="wordmark">Vexra<span class="dot">.</span></div>
    <div class="version">Roblox Lookup</div>
  </div>

  <div class="hero">
    <h1>Find any<br><strong>Roblox profile.</strong></h1>
    <p></p>
  </div>

  <div class="search">
    <input type="text" id="inp" placeholder="Enter username" autocomplete="off" />
    <button id="btn" onclick="lookup()">Search</button>
  </div>

  <div class="error" id="err"></div>
  <div class="loader" id="load"><div class="loader-bar"></div></div>

  <div id="result" class="fade">

    <div class="profile">
      <img class="av" id="av" src="" alt="" />
      <div class="pinfo">
        <div class="pname" id="pname"></div>
        <div class="pmeta" id="pmeta"></div>
        <div class="pdesc" id="pdesc"></div>
        <div class="badges" id="chips"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="stats" id="stats"></div>

    <div class="table">
      <div class="label">Details</div>
      <div id="details"></div>
    </div>

    <div id="fsec" style="display:none">
      <div class="label" style="margin-bottom:16px">Friends</div>
      <div class="friends-grid" id="fgrid"></div>
    </div>

    <div class="groups" id="gsec" style="display:none">
      <div class="label" style="margin-bottom:4px">Groups</div>
      <div id="glist"></div>
    </div>

  </div>

  <footer>Vexra</footer>
</div>

<script>
const P = "https://corsproxy.io/?";
const get = u => fetch(P+encodeURIComponent(u)).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});
const post = (u,b) => fetch(P+encodeURIComponent(u),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());

const fmt = n => { if(n==null)return '—'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toLocaleString(); };
const fdate = d => d ? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '—';
const row = (k,v) => `<div class="trow"><span class="tk">${k}</span><span class="tv">${v??'—'}</span></div>`;

document.getElementById('inp').onkeydown = e => e.key==='Enter' && lookup();

async function lookup() {
  const u = document.getElementById('inp').value.trim();
  if(!u) return;
  document.getElementById('err').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('load').style.display = 'block';
  document.getElementById('btn').disabled = true;

  try {
    const ud = await post('https://users.roblox.com/v1/usernames/users',{usernames:[u],excludeBannedUsers:false});
    if(!ud.data?.length) throw new Error(`"${u}" not found`);
    const id = ud.data[0].id;

    const [info, pres, friends, groups, thumb] = await Promise.allSettled([
      get(`https://users.roblox.com/v1/users/${id}`),
      post('https://presence.roblox.com/v1/presence/users',{userIds:[id]}),
      get(`https://friends.roblox.com/v1/users/${id}/friends?limit=50`),
      get(`https://groups.roblox.com/v1/users/${id}/groups/roles`),
      get(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=420x420&format=Png`)
    ]);

    const I = info.value ?? {};
    const PR = pres.value?.userPresences?.[0];
    const pt = PR?.userPresenceType ?? 0;
    const F = friends.value?.data ?? [];
    const G = groups.value?.data ?? [];
    const imgUrl = thumb.value?.data?.[0]?.imageUrl ?? '';

    document.getElementById('av').src = imgUrl;
    document.getElementById('pname').textContent = I.displayName || I.name || u;

    const same = I.displayName === I.name;
    document.getElementById('pmeta').textContent = same
      ? `@${I.name} · ID ${id}`
      : `@${I.name} · ${I.displayName} · ID ${id}`;

    document.getElementById('pdesc').textContent = I.description?.trim() || 'No description.';

    const presLabel = ['Offline','Online','In Game','In Studio'][pt] ?? 'Unknown';
    let chips = '';
    if(pt===0) chips += `<span class="badge b-offline">Offline</span>`;
    else if(pt===1) chips += `<span class="badge b-online">Online</span>`;
    else if(pt===2) chips += `<span class="badge b-ingame">In Game</span>`;
    else if(pt===3) chips += `<span class="badge b-ingame">In Studio</span>`;
    if(I.hasVerifiedBadge) chips += `<span class="badge b-verify">Verified</span>`;
    if(I.isBanned) chips += `<span class="badge b-banned">Banned</span>`;
    document.getElementById('chips').innerHTML = chips;

    const ageDays = I.created ? Math.floor((Date.now()-new Date(I.created))/864e5) : null;
    const ageStr = ageDays!=null ? (ageDays/365).toFixed(1)+'y' : '—';

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-v">${fmt(F.length)}</div><div class="stat-l">Friends</div></div>
      <div class="stat"><div class="stat-v">${fmt(G.length)}</div><div class="stat-l">Groups</div></div>
      <div class="stat"><div class="stat-v">${ageStr}</div><div class="stat-l">Age</div></div>
      <div class="stat"><div class="stat-v">${presLabel}</div><div class="stat-l">Status</div></div>
    `;

    document.getElementById('details').innerHTML =
      row('Username', I.name) +
      row('Display Name', I.displayName) +
      row('User ID', id) +
      row('Joined', fdate(I.created)) +
      row('Last Seen', PR?.lastLocation || '—') +
      row('Verified', I.hasVerifiedBadge ? 'Yes' : 'No') +
      row('Banned', I.isBanned ? 'Yes' : 'No');

    // Friends
    const fsec = document.getElementById('fsec');
    if(F.length) {
      const ids = F.slice(0,20).map(f=>f.id);
      let ft = {};
      try {
        const r = await get(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${ids.join(',')}&size=150x150&format=Png`);
        r.data?.forEach(t=>{ft[t.targetId]=t.imageUrl;});
      } catch(e){}
      document.getElementById('fgrid').innerHTML = F.slice(0,20).map(f=>`
        <div class="fc">
          <img class="fav" src="${ft[f.id]||''}" alt="${f.name}" onerror="this.style.opacity=0"/>
          <div class="fn">${f.displayName||f.name}</div>
        </div>
      `).join('');
      fsec.style.display = '';
    } else { fsec.style.display = 'none'; }

    // Groups
    const gsec = document.getElementById('gsec');
    if(G.length) {
      document.getElementById('glist').innerHTML = G.slice(0,15).map(g=>`
        <div class="gi">
          <div class="gico">⬡</div>
          <div><div class="gn">${g.group?.name||'Group'}</div><div class="gr">${g.role?.name||'Member'}</div></div>
        </div>
      `).join('');
      gsec.style.display = '';
    } else { gsec.style.display = 'none'; }

    document.getElementById('result').style.display = 'block';

  } catch(e) {
    const el = document.getElementById('err');
    el.textContent = e.message || 'Something went wrong.';
    el.style.display = 'block';
  } finally {
    document.getElementById('load').style.display = 'none';
    document.getElementById('btn').disabled = false;
  }
}
</script>
</body>
</html>
